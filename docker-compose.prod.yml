# Production override for docker-compose.yml
version: '3.8'

services:
  mysql:
    environment:
      # Override with production passwords
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-your_secure_root_password}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-your_secure_password}
    # Remove port exposure for security
    ports: []
    # Add restart policy
    restart: always

  app:
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
    # Remove port exposure if using reverse proxy
    # ports: []
    restart: always
    # Add resource limits
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Remove development service in production
  app-dev:
    profiles:
      - dev

