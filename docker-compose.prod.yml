# Production override for docker-compose.yml
version: '3.8'

services:
  mysql:
    environment:
      # Override with production passwords
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-your_secure_root_password}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-your_secure_password}
    # Remove port exposure for security
    ports: []
    # Add restart policy
    restart: always

  app:
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - MYSQL_URL=${MYSQL_URL}
      - DB_HOST=${DB_HOST}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - DB_PORT=${DB_PORT}
      - MYSQL_SSL=true
    # Remove port exposure if using reverse proxy
    # ports: []
    restart: always
    # Add resource limits
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Remove development service in production
  app-dev:
    profiles:
      - dev

